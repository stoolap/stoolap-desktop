name: CI

on:
  push:
    branches: [main]
    tags-ignore: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  STOOLAP_ENGINE_REF: main

jobs:
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Frontend build
        run: npm run vite:build

  check-rust:
    name: Check - ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-14
            target: aarch64-apple-darwin
          - name: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout stoolap-desktop
        uses: actions/checkout@v4
        with:
          path: stoolap-desktop

      - name: Checkout stoolap engine
        uses: actions/checkout@v4
        with:
          repository: stoolap/stoolap
          ref: ${{ env.STOOLAP_ENGINE_REF }}
          path: stoolap

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: stoolap-desktop/src-tauri
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: stoolap-desktop/package-lock.json

      - name: Install npm dependencies (for beforeBuildCommand)
        working-directory: stoolap-desktop
        run: npm ci

      - name: Build frontend (Tauri expects dist/)
        working-directory: stoolap-desktop
        run: npm run vite:build

      - name: Clippy (deny warnings)
        working-directory: stoolap-desktop/src-tauri
        run: cargo clippy --all-targets --all-features --target ${{ matrix.target }} -- -D warnings

      - name: Cargo check
        working-directory: stoolap-desktop/src-tauri
        run: cargo check --target ${{ matrix.target }}
