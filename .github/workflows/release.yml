name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

# Re-pushing a tag cancels the older run so we don't pile up queued jobs.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: macOS (Intel)
            os: macos-14  # Cross-compile on Apple Silicon — macos-13 Intel runners queue forever
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    name: Build - ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (required for auto-update to work)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization: tauri-action triggers the signing
          # path as soon as any of these env vars is *set*, even to an empty
          # string — so we only attach them when the corresponding secrets
          # actually exist. Add the secrets and uncomment to enable:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Stoolap Desktop ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            Pick the installer for your operating system.

            | Platform | File | Notes |
            |----------|------|-------|
            | **macOS — Apple Silicon** (M1/M2/M3/M4) | `Stoolap.Desktop_${{ github.ref_name }}_aarch64.dmg` | Recommended for all Apple Silicon Macs |
            | **macOS — Intel** | `Stoolap.Desktop_${{ github.ref_name }}_x64.dmg` | For Intel-based Macs (pre-2020) |
            | **Windows 10 / 11** | `Stoolap.Desktop_${{ github.ref_name }}_x64-setup.exe` | Recommended. Or `_x64_en-US.msi` for admin deployment |
            | **Linux — Debian / Ubuntu** | `Stoolap.Desktop_${{ github.ref_name }}_amd64.deb` | `sudo dpkg -i <file>` |
            | **Linux — Fedora / RHEL** | `Stoolap.Desktop-${{ github.ref_name }}-1.x86_64.rpm` | `sudo rpm -i <file>` |
            | **Linux — any distro** | `Stoolap.Desktop_${{ github.ref_name }}_amd64.AppImage` | Portable; `chmod +x` then run |

            ### Not sure which Mac you have?
            Click the Apple menu → **About This Mac**. *Apple M1/M2/M3/M4* → use `aarch64`. *Intel* → use `x64`.

            ### Auto-update
            Installed apps check for new releases on launch. You can also trigger a check manually from **Stoolap Desktop → Check for Updates…** (macOS) or the Help menu (Linux / Windows).

            ---

            The `.sig` and `.app.tar.gz` files next to each installer are used by the auto-updater — you do not need to download them.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  publish-release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as published
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = context.ref.replace('refs/tags/', '');
            // `getReleaseByTag` returns 404 for drafts, so list and filter.
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner, repo, per_page: 100,
            });
            const release = releases.find((r) => r.tag_name === tag);
            if (!release) {
              throw new Error(`No release found for tag ${tag}`);
            }
            await github.rest.repos.updateRelease({
              owner, repo,
              release_id: release.id,
              draft: false,
              generate_release_notes: true,
            });
